      <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }
        .terminal {
          font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
          background: #FFFFFF;
          border-radius: 10px;
          overflow: hidden;
          position: relative;
          height: 320px;
          border: 1px solid #D0D7DE;
        }
        .terminal-bar {
          background: #F6F8FA;
          padding: 8px 12px;
          display: flex;
          align-items: center;
          gap: 6px;
          border-bottom: 1px solid #D0D7DE;
        }
        .dot {
          width: 10px;
          height: 10px;
          border-radius: 50%;
          display: inline-block;
        }
        .dot.red { background: #FF5F57; }
        .dot.yellow { background: #FEBC2E; }
        .dot.green { background: #28C840; }
        .terminal-title {
          color: #656D76;
          font-size: 11px;
          margin-left: 8px;
        }
        .terminal-body {
          padding: 12px 16px;
          display: flex;
          flex-direction: column;
          height: calc(320px - 34px);
        }
        .prompt-line {
          margin-bottom: 6px;
          font-size: 12px;
        }
        .prompt {
          color: #6C63FF;
          font-weight: bold;
        }
        .cmd {
          color: #1F2328;
        }
        .cursor {
          color: #6C63FF;
          animation: blink 1s step-end infinite;
          font-size: 12px;
        }
        @keyframes blink {
          0%, 100% { opacity: 1; }
          50% { opacity: 0; }
        }
        .ascii-name {
          font-size: 7.5px;
          line-height: 1.1;
          letter-spacing: 0.5px;
          background: linear-gradient(90deg, #E50000, #E57300, #D4D400, #00B300, #00A0CC, #0055CC, #7700B3, #E50000);
          background-size: 800% 100%;
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          background-clip: text;
          animation: rainbow 4s linear infinite;
          margin: 4px 0;
          white-space: pre;
          font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
        }
        @keyframes rainbow {
          0% { background-position: 0% 50%; }
          100% { background-position: 100% 50%; }
        }
        .tagline {
          font-size: 13px;
          margin: 8px 0;
        }
        .tag-bracket {
          color: #6C63FF;
        }
        .tag-text {
          color: #1F2328;
        }
        .tag-sep {
          color: #D0D7DE;
        }
        .status-bar {
          display: flex;
          align-items: center;
          gap: 12px;
          margin-top: auto;
          padding-top: 8px;
          border-top: 1px solid #D8DEE4;
          font-size: 11px;
        }
        .status-item {
          color: #656D76;
        }
        .status-dot {
          width: 6px;
          height: 6px;
          border-radius: 50%;
          background: #1A7F37;
          display: inline-block;
          animation: pulse 2s ease infinite;
          margin-left: auto;
        }
        @keyframes pulse {
          0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(26, 127, 55, 0.4); }
          50% { opacity: 0.7; box-shadow: 0 0 0 4px rgba(26, 127, 55, 0); }
        }
        .status-uptime {
          color: #1A7F37;
          font-size: 11px;
        }
