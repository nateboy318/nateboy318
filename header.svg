<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6C63FF">
        <animate attributeName="stop-color" values="#6C63FF;#00D4FF;#FF6B6B;#6C63FF" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#00D4FF">
        <animate attributeName="stop-color" values="#00D4FF;#FF6B6B;#6C63FF;#00D4FF" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#FF6B6B">
        <animate attributeName="stop-color" values="#FF6B6B;#6C63FF;#00D4FF;#FF6B6B" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="subtitleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B949E">
        <animate attributeName="stop-color" values="#8B949E;#C9D1D9;#8B949E" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#C9D1D9">
        <animate attributeName="stop-color" values="#C9D1D9;#8B949E;#C9D1D9" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="200" fill="#0D1117"/>

  <!-- Animated scan line -->
  <rect width="800" height="1" fill="#6C63FF" opacity="0.15" y="0">
    <animate attributeName="y" values="0;200;0" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.05;0.15" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Terminal prompt -->
  <text x="400" y="45" font-family="'Courier New', monospace" font-size="14" fill="#8B949E" text-anchor="middle" opacity="0.6">
    ~/nateboy318
  </text>

  <!-- Main name with animated gradient -->
  <text x="400" y="110" font-family="'Courier New', monospace" font-weight="bold" font-size="64" fill="url(#grad)" text-anchor="middle" filter="url(#glow)" letter-spacing="8">
    NATE ROYAL
    <animate attributeName="opacity" values="0;1" dur="1s" fill="freeze"/>
  </text>

  <!-- Cursor blink after name -->
  <rect x="618" y="82" width="3" height="35" fill="url(#grad)">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Subtitle -->
  <text x="400" y="155" font-family="'Courier New', monospace" font-size="16" fill="url(#subtitleGrad)" text-anchor="middle" letter-spacing="4">
    FOUNDER &amp; DEVELOPER  //  LOUISVILLE, KY
  </text>

  <!-- Bottom accent line -->
  <rect y="185" width="0" height="2" fill="url(#grad)" rx="1">
    <animate attributeName="width" values="0;800" dur="2s" fill="freeze"/>
    <animate attributeName="x" values="400;0" dur="2s" fill="freeze"/>
  </rect>
</svg>
