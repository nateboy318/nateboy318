 РќѕРќѕРќѕРќѕРЋЌ  РќѕРќѕРЋЉРќѕРќѕРЋћРЋљРЋљРќѕРќѕРЋЌРЋџРЋљРЋљРќѕРќѕРЋћРЋљРЋљРЋЮРќѕРќѕРЋћРЋљРЋљРЋљРЋљРЋЮ
 РќѕРќѕРЋћРќѕРќѕРЋЌ РќѕРќѕРЋЉРќѕРќѕРќѕРќѕРќѕРќѕРќѕРЋЉ   РќѕРќѕРЋЉ   РќѕРќѕРќѕРќѕРќѕРЋЌ  
 РќѕРќѕРЋЉРЋџРќѕРќѕРЋЌРќѕРќѕРЋЉРќѕРќѕРЋћРЋљРЋљРќѕРќѕРЋЉ   РќѕРќѕРЋЉ   РќѕРќѕРЋћРЋљРЋљРЋЮ  
 РќѕРќѕРЋЉ РЋџРќѕРќѕРќѕРќѕРЋЉРќѕРќѕРЋЉ  РќѕРќѕРЋЉ   РќѕРќѕРЋЉ   РќѕРќѕРќѕРќѕРќѕРќѕРќѕРЋЌ
 РЋџРЋљРЋЮ  РЋџРЋљРЋљРЋљРЋЮРЋџРЋљРЋЮ  РЋџРЋљРЋЮ   РЋџРЋљРЋЮ   РЋџРЋљРЋљРЋљРЋљРЋљРЋљРЋЮ
 РќѕРќѕРќѕРќѕРќѕРќѕРЋЌ  РќѕРќѕРќѕРќѕРќѕРќѕРЋЌ РќѕРќѕРЋЌ   РќѕРќѕРЋЌ РќѕРќѕРќѕРќѕРќѕРЋЌ РќѕРќѕРЋЌ     
 РќѕРќѕРЋћРЋљРЋљРќѕРќѕРЋЌРќѕРќѕРЋћРЋљРЋљРЋљРќѕРќѕРЋЌРЋџРќѕРќѕРЋЌ РќѕРќѕРЋћРЋЮРќѕРќѕРЋћРЋљРЋљРќѕРќѕРЋЌРќѕРќѕРЋЉ     
 РќѕРќѕРќѕРќѕРќѕРќѕРЋћРЋЮРќѕРќѕРЋЉ   РќѕРќѕРЋЉ РЋџРќѕРќѕРќѕРќѕРЋћРЋЮ РќѕРќѕРќѕРќѕРќѕРќѕРќѕРЋЉРќѕРќѕРЋЉ     
 РќѕРќѕРЋћРЋљРЋљРќѕРќѕРЋЌРќѕРќѕРЋЉ   РќѕРќѕРЋЉ  РЋџРќѕРќѕРЋћРЋЮ  РќѕРќѕРЋћРЋљРЋљРќѕРќѕРЋЉРќѕРќѕРЋЉ     
 РќѕРќѕРЋЉ  РќѕРќѕРЋЉРЋџРќѕРќѕРќѕРќѕРќѕРќѕРЋћРЋЮ   РќѕРќѕРЋЉ   РќѕРќѕРЋЉ  РќѕРќѕРЋЉРќѕРќѕРќѕРќѕРќѕРќѕРќѕРЋЌ
 РЋџРЋљРЋЮ  РЋџРЋљРЋЮ РЋџРЋљРЋљРЋљРЋљРЋљРЋЮ    РЋџРЋљРЋЮ   РЋџРЋљРЋЮ  РЋџРЋљРЋЮРЋџРЋљРЋљРЋљРЋљРЋљРЋљРЋЮ</pre>
          <div class="tagline">
            <span class="tag-bracket">[</span>
            <span class="tag-text">founder</span>
            <span class="tag-bracket">]</span>
            <span class="tag-sep"> ┬и </span>
            <span class="tag-bracket">[</span>
            <span class="tag-text">developer</span>
            <span class="tag-bracket">]</span>
            <span class="tag-sep"> ┬и </span>
            <span class="tag-bracket">[</span>
            <span class="tag-text">louisville, ky</span>
            <span class="tag-bracket">]</span>
          </div>
          <div class="status-bar">
            <span class="status-item">РќИ ts</span>
            <span class="status-item">РќИ py</span>
            <span class="status-item">РќИ next.js</span>
            <span class="status-item">РќИ react</span>
            <span class="status-dot"></span>
            <span class="status-uptime">uptime: since 2014</span>
          </div>
        </div>
      </div>
      <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }
        .terminal {
          font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
          background: #0D1117;
          border-radius: 10px;
          overflow: hidden;
          position: relative;
          height: 320px;
          border: 1px solid #30363D;
        }
        .terminal-bar {
          background: #161B22;
          padding: 8px 12px;
          display: flex;
          align-items: center;
          gap: 6px;
          border-bottom: 1px solid #30363D;
        }
        .dot {
          width: 10px;
          height: 10px;
          border-radius: 50%;
          display: inline-block;
        }
        .dot.red { background: #FF5F57; }
        .dot.yellow { background: #FEBC2E; }
        .dot.green { background: #28C840; }
        .terminal-title {
          color: #8B949E;
          font-size: 11px;
          margin-left: 8px;
        }
        .terminal-body {
          padding: 12px 16px;
          display: flex;
          flex-direction: column;
          height: calc(320px - 34px);
        }
        .prompt-line {
          margin-bottom: 6px;
          font-size: 12px;
        }
        .prompt {
          color: #6C63FF;
          font-weight: bold;
        }
        .cmd {
          color: #C9D1D9;
        }
        .cursor {
          color: #6C63FF;
          animation: blink 1s step-end infinite;
          font-size: 12px;
        }
        @keyframes blink {
          0%, 100% { opacity: 1; }
          50% { opacity: 0; }
        }
        .ascii-name {
          font-size: 7.5px;
          line-height: 1.1;
          letter-spacing: 0.5px;
          background: linear-gradient(90deg, #FF0000, #FF8800, #FFFF00, #00FF00, #00DDFF, #0066FF, #8B00FF, #FF0000);
          background-size: 800% 100%;
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          background-clip: text;
          animation: rainbow 4s linear infinite;
          margin: 4px 0;
          white-space: pre;
          font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
        }
        @keyframes rainbow {
          0% { background-position: 0% 50%; }
          100% { background-position: 100% 50%; }
        }
        .tagline {
          font-size: 13px;
          margin: 8px 0;
          animation: fadeIn 1s ease-in;
        }
        @keyframes fadeIn {
          from { opacity: 0; }
          to { opacity: 1; }
        }
        .tag-bracket {
          color: #6C63FF;
        }
        .tag-text {
          color: #C9D1D9;
        }
        .tag-sep {
          color: #30363D;
        }
        .status-bar {
          display: flex;
          align-items: center;
          gap: 12px;
          margin-top: auto;
          padding-top: 8px;
          border-top: 1px solid #21262D;
          font-size: 11px;
        }
        .status-item {
          color: #8B949E;
        }
        .status-dot {
          width: 6px;
          height: 6px;
          border-radius: 50%;
          background: #28C840;
          display: inline-block;
          animation: pulse 2s ease infinite;
          margin-left: auto;
        }
        @keyframes pulse {
          0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(40, 200, 64, 0.4); }
          50% { opacity: 0.7; box-shadow: 0 0 0 4px rgba(40, 200, 64, 0); }
        }
        .status-uptime {
          color: #28C840;
          font-size: 11px;
        }
      </style>
    </div>
